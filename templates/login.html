<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../static/css/style.css"></head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh; background:#0b111a;">
    <div class="card" style="width:350px;">
        <h2 style="color:var(--primary); font-family:'Orbitron';">USER_LOGIN</h2>
        <form method="POST" style="margin-top:20px;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-premium" style="width:100%; margin-top:15px;">INITIALIZE</button>
        </form>
        <p style="font-size:0.7rem; margin-top:15px; opacity:0.6;">New user? <a href="/register" style="color:var(--secondary);">Create ID</a></p>
    </div>
</body>
</html>
