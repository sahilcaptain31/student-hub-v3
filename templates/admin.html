<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="../static/css/style.css"></head>
<body style="padding: 40px;">
    <h1 style="color:var(--primary); font-family:'Orbitron';">ADMIN_OS</h1>
    <a href="/">Back Home</a>

    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
        <div class="card">
            <h3>UPLOAD FILE</h3>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <input type="text" name="subject" placeholder="Subject Name" required>
                <select name="type" style="width:100%; margin:10px 0;">
                    <option value="notes">Notes</option>
                    <option value="pyq">PYQ</option>
                </select>
                <input type="file" name="file" required>
                <button type="submit" class="btn-premium" style="width:100%; margin-top:10px;">DEPLOY</button>
            </form>
        </div>

        <div class="card">
            <h3>USERS</h3>
            {% for u in users %}
                <p style="font-size:0.8rem;">{{ u.username }} | LVL: {{ u.level }} | Role: {{ u.role }}</p>
            {% endfor %}
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>FILES</h3>
        {% for n in notes %}
            <p>Notes: {{ n.subject }} <a href="/delete/notes/{{ n.id }}" style="color:red;">[DEL]</a></p>
        {% endfor %}
        {% for p in pyqs %}
            <p>PYQ: {{ p.subject }} <a href="/delete/pyq/{{ p.id }}" style="color:red;">[DEL]</a></p>
        {% endfor %}
    </div>
</body>
</html>
