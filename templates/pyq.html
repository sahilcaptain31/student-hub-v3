<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/css/style.css">
    <title>PYQ Archive | Pro</title>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">HUB.OS</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <span id="navLvl" style="background:var(--secondary); padding:2px 8px; border-radius:5px; font-size:0.7rem;">LVL 1</span>
        </div>
    </nav>

    <div style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
        <h1 style="font-family:'Orbitron'; color:var(--secondary); text-align:center;">PYQ_<span>ARCHIVE</span></h1>
        
        <div class="grid" style="grid-template-columns: repeat(2, 1fr); margin-top:30px;">
            {% for item in items %}
            <div class="card" style="text-align:left; border-color:var(--secondary);">
                <h3>{{ item['subject'] }}</h3>
                <p style="font-size:0.7rem; opacity:0.5; margin-bottom:15px;">Previous Year Paper</p>
                <button onclick="viewFile('{{ item['filename'] }}')" class="btn-premium" style="width:100%; background:var(--secondary);">OPEN PAPER</button>
                {% if session['role'] == 'admin' %}
                    <a href="/delete/pyq/{{ item['id'] }}" style="color:red; font-size:0.6rem; display:block; margin-top:10px;">[DELETE]</a>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        let xp = parseInt(localStorage.getItem('hXP')) || 0;
        let lvl = parseInt(localStorage.getItem('hLVL')) || 1;
        document.getElementById('navLvl').innerText = "LVL " + lvl;

        function viewFile(name) {
            xp += 10; // PYQ gives 10 XP
            if(xp >= lvl*100) { xp=0; lvl++; alert("LEVEL UP! 🚀"); }
            localStorage.setItem('hXP', xp);
            localStorage.setItem('hLVL', lvl);
            
            window.open('/view/' + name, '_blank');
        }
    </script>
</body>
</html>
